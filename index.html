<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Who's that Pokemon</title>
  </head>
  <body>
    <header class="site-header">
      <h1 class="logo">Who's that Pokemon</h1>
      <h2 class="subtitle">Guess the pokemon based on its shadow. Add that pokemon to your pokedex and test your knowledge!</h2>
    </header>

    <div id="login-container">
      <h2>Login</h2>
      <input id="username-input" type="text" placeholder="Enter your name" />
      <button id="login-btn">Login</button>
    </div>

    <main>
      <div id="pokemon-container">
        <img id="pokemon-img" alt="Pokemon" />
      </div>
      <div>
        <label for="user-input">Enter a guess</label>
        <input id="user-input" type="text" placeholder="Type your answer here" />
      </div>
      <div>
        <button id="reveal-answer-btn">Reveal the answer</button>
        <button id="show-answer-btn">Show Answer and Next</button>
      </div>
      <div id="feedback"></div>
      <div>
        <h3 class = "sub-header">Pokedex
        </h3>
      </div>
       <div id="pokedex-container">
        <ul id="pokedex-list"></ul>
      </div>
    </main>
    <script>   
</script>
    <script src="index.js"></script>
  </body>
</html>
